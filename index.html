<!DOCTYPE html>
<!-- This tells the browser that this is an HTML5 document -->
<html lang="en">
<!-- The root element of the HTML page -->
<head>
  <!-- Metadata about the page goes here -->
  <meta charset="UTF-8">
  <!-- Sets the character encoding to UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Makes the page responsive on mobile devices -->
  <title>My Simple Portfolio</title>
  <!-- The title shown in the browser tab -->
</head>
<body>
  <!-- The visible content of the page goes inside the body -->
  <header>
    <!-- A header usually contains the main title or navigation -->
    <h1>Welcome to My Portfolio</h1>
    <!-- Main heading for the page -->
  </header>
  <main>
    <!-- The main section contains the primary content -->
    <section>
      <h2>About Me</h2>
      <!-- A secondary heading for a section -->
      <p>Hello! This is a super simple page where I can show my work and share a little about myself.</p>
      <!-- A paragraph with some introductory text -->
    </section>
    <section>
      <h2>Contact</h2>
      <p>You can reach me by email at <a href="mailto:noah@theconnetts.com">noah@theconnetts.com</a>.</p>
      <!-- A link that opens the user's email client -->
    </section>
  </main>
  <footer>
    <!-- Footer content goes here -->
    <p>Copyright Noah Connett © 2026</p>
  </footer>
</body>
</html>
